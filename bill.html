<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIOPIA COFFEE HOUSE - Minimal POS System</title>
    <style>
        /* CSS Variables for Minimalist POS styling */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --accent-dark: #222222;
            --gray-light: #f4f4f4;
            --gray-border: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--gray-light);
            color: var(--text-color);
            line-height: 1.4;
            padding: 20px;
        }

        .pos-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .pos-container {
                grid-template-columns: 7fr 5fr;
            }
        }

        /* Interactive Workspaces panels */
        .panel {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border-b: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 576px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        input[type="text"], input[type="tel"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--gray-border);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--border-color);
        }

        /* Radios & Settlement Layouts */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .conditional-field {
            display: none;
            margin-top: 10px;
        }

        /* Core Action Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border: 2px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-add {
            background-color: var(--accent-dark);
            color: var(--bg-color);
        }

        .btn-print {
            background-color: #111111;
            color: #ffffff;
            font-size: 16px;
            padding: 15px;
        }

        .btn-print:hover {
            background-color: #444444;
            color: #ffffff;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        /* Datagrid Tables inside Screen UI */
        .table-wrapper {
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid var(--gray-border);
        }

        .pos-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .pos-table th, .pos-table td {
            padding: 10px;
            border-bottom: 1px solid var(--gray-border);
        }

        .pos-table th {
            background-color: var(--gray-light);
            font-weight: bold;
            text-transform: uppercase;
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .btn-action-del {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        /* Live Preview Paper Box Wrapper Frame */
        .preview-box {
            background-color: #555555;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: start;
            max-height: 600px;
            overflow-y: auto;
            border-radius: 4px;
        }

        /* History Registry Layouts */
        .history-section {
            grid-column: 1 / -1;
        }

        .history-table th, .history-table td {
            font-size: 12px;
            padding: 8px;
        }

        .btn-reprint {
            padding: 4px 8px;
            font-size: 11px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-reprint:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Pure Core 80mm Structural Layout Mirror (Mimicking image_2.png) */
        .receipt-body {
            width: 72mm;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 2mm;
            font-family: 'Courier New', Courier, monospace !important;
            font-size: 13px !important;
            font-weight: bold !important;
            line-height: 1.3 !important;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .receipt-body * {
            font-family: 'Courier New', Courier, monospace !important;
            color: #000000 !important;
            font-weight: bold !important;
            background: transparent !important;
        }

        .receipt-center {
            text-align: center;
        }

        .receipt-header-title {
            font-size: 15px;
            font-weight: 1000 !important;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .receipt-header-sub {
            font-size: 11px;
        }

        .receipt-divider {
            text-align: center;
            margin: 2px 0;
            letter-spacing: -0.5px;
            font-size: 12px;
        }

        .receipt-meta-table, .receipt-items-table, .receipt-totals-table {
            width: 100%;
            border-collapse: collapse;
        }

        .receipt-meta-table td {
            font-size: 13px;
            padding: 1px 0;
            vertical-align: top;
        }

        .receipt-items-table th, .receipt-items-table td {
            font-size: 13px;
            padding: 3px 0;
            vertical-align: top;
        }

        .receipt-items-table th {
            text-transform: uppercase;
            border-bottom: 1px dashed #000000;
        }

        .receipt-totals-table td {
            font-size: 13px;
            padding: 2px 0;
        }

        .receipt-grand-total {
            font-size: 14px;
            font-weight: 900 !important;
        }

        .receipt-footer-text {
            font-size: 12px;
            margin-top: 4px;
        }

        /* Global Control Flags for Display Mirror Routing Hooks */
        .print-only {
            display: none;
        }

        /* Clean targeted hardware routing print engine commands */
        @media print {
            @page {
                size: 80mm auto;
                margin: 0;
            }
            body {
                width: 72mm;
                margin: 0 auto;
                padding: 2mm 0 0 0;
                background-color: #ffffff !important;
                color: #000000 !important;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .receipt-body {
                box-shadow: none !important;
                width: 72mm !important;
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="pos-container no-print">
        
        <!-- Left Column: Sales Operations Deck -->
        <div class="space-y" style="display: flex; flex-direction: column; gap: 20px;">
            
            <!-- Company & Customer Configuration Panel -->
            <div class="panel">
                <div class="panel-title">
                    <span>☕ Order Processing Window</span>
                    <span id="screenBillId" style="font-family: monospace; font-size: 14px;">ECH-000001</span>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="custName" placeholder="Enter name" oninput="liveRenderPreview()">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="custMobile" placeholder="Enter mobile" maxlength="10" oninput="liveRenderPreview()">
                    </div>
                </div>
            </div>

            <!-- Cartesian Product Entry Panel -->
            <div class="panel">
                <div class="panel-title">🛒 Cart Inventory Intake</div>
                
                <div class="form-row" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="itemCategory" onchange="populateItemsMenu()">
                            <!-- Generated on runtime init arrays -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Item Name</label>
                        <select id="itemName" onchange="matchDatabasePrice()">
                            <!-- Populated structurally via category selections -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Unit Price (₹)</label>
                        <input type="number" id="itemPrice" readonly style="background-color: var(--gray-light);">
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="itemQty" value="1" min="1">
                    </div>
                </div>

                <button class="btn btn-add" onclick="pushItemToInvoice()">Add Item To Cart</button>

                <!-- Current Dynamic Interactive Matrix View -->
                <div class="table-wrapper">
                    <table class="pos-table">
                        <thead>
                            <tr>
                                <th>Item Label Description</th>
                                <th class="text-center" style="width: 80px;">Qty</th>
                                <th class="text-right" style="width: 100px;">Price</th>
                                <th class="text-right" style="width: 100px;">Amount</th>
                                <th class="text-center" style="width: 60px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody">
                            <!-- Dynamic rows appended instantly here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Settlement Selection Panel -->
            <div class="panel">
                <div class="panel-title">💳 Financial Ledger Settlement</div>
                
                <div class="form-group">
                    <label>Payment Settlement Mode</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="paymentMode" value="Cash" checked onchange="togglePaymentFields(this.value)"> Cash
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="paymentMode" value="UPI" onchange="togglePaymentFields(this.value)"> UPI
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="paymentMode" value="Card" onchange="togglePaymentFields(this.value)"> Card
                        </label>
                    </div>
                </div>

                <!-- Conditional Forms Input Groups -->
                <div id="upiFieldContainer" class="form-group conditional-field">
                    <label>Transaction ID (Optional)</label>
                    <input type="text" id="upiTxnId" placeholder="Enter UPI Ref Number" oninput="liveRenderPreview()">
                </div>

                <div id="cardFieldContainer" class="form-group conditional-field">
                    <label>Last 4 Digits of Card (Optional)</label>
                    <input type="text" id="cardDigits" placeholder="e.g. 4321" maxlength="4" oninput="liveRenderPreview()">
                </div>

                <div class="form-group" style="margin-top: 15px; max-w: 200px; margin-left: auto;">
                    <label>Discount Value (₹)</label>
                    <input type="number" id="billDiscount" value="0" min="0" oninput="liveRenderPreview()">
                </div>
            </div>
        </div>

        <!-- Right Column: Live Emulator Engine Viewer -->
        <div class="panel" style="display: flex; flex-direction: column;">
            <div class="panel-title">📋 Live 80mm POS Sheet Emulation</div>
            <div class="preview-box">
                <!-- Virtual Component target mapped via updating state loops -->
                <div id="virtualReceiptEmbed"></div>
            </div>
            <div class="btn-grid">
                <button class="btn" style="background-color: #990000; color: white; border-color: #990000;" onclick="clearActiveBillWorkspace()">Clear Bill</button>
                <button class="btn" style="background-color: #0044cc; color: white; border-color: #0044cc;" onclick="triggerNewBillCycle()">New Bill</button>
            </div>
            <button class="btn btn-print" style="margin-top: 10px;" onclick="executeBillPrintPipeline()">🖨️ Print Bill</button>
        </div>

        <!-- Sales Registry Logs View Sheet -->
        <div class="panel history-section">
            <div class="panel-title">📜 System Historic Sales Logs (Max 100 entries)</div>
            <div class="table-wrapper">
                <table class="pos-table history-table">
                    <thead>
                        <tr>
                            <th>Bill No</th>
                            <th>Timestamp</th>
                            <th>Customer Profile</th>
                            <th>Mobile</th>
                            <th class="text-right">Grand Total</th>
                            <th class="text-center">System Reprints</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableLogsBody">
                        <!-- Iterated via structural parsing sequences -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Isolated Clean Domain Target Wrapper bound to hardware printing prompts -->
    <div id="printStationContainer" class="print-only"></div>

    <!-- Implementation Script Core Engine Engine Architecture -->
    <script>
        // Master Menu Data Array Specifications
        const menuDatabase = {
            "Coffee": [
                {"name": "Espresso", "price": 120},
                {"name": "Americano", "price": 150},
                {"name": "Cappuccino (R)", "price": 230},
                {"name": "Cappuccino (L)", "price": 280},
                {"name": "Latte (R)", "price": 240},
                {"name": "Latte (L)", "price": 290},
                {"name": "Mocha", "price": 260}
            ],
            "Tea": [
                {"name": "Passion Ice Tea (M)", "price": 300},
                {"name": "Lemon Ice Tea", "price": 250},
                {"name": "Green Tea", "price": 180}
            ]
        };

        // Reactive Application Data State Arrays
        let currentBillItems = [];
        let billCounterToken = 1;
        let persistentLedgerHistory = [];

        window.onload = function() {
            bootstrapApplicationCore();
        };

        function bootstrapApplicationCore() {
            // Setup sequential indices identifiers values 
            if (localStorage.getItem('ethiopia_pos_counter_v3')) {
                billCounterToken = parseInt(localStorage.getItem('ethiopia_pos_counter_v3'));
            } else {
                localStorage.setItem('ethiopia_pos_counter_v3', billCounterToken);
            }

            // Sync persistent transactional historical logging records
            if (localStorage.getItem('ethiopia_pos_ledger_v3')) {
                persistentLedgerHistory = JSON.parse(localStorage.getItem('ethiopia_pos_ledger_v3'));
            } else {
                localStorage.setItem('ethiopia_pos_ledger_v3', JSON.stringify([]));
            }

            document.getElementById('screenBillId').innerText = `ECH-${String(billCounterToken).padStart(6, '0')}`;
            
            initializeMenuDropdowns();
            renderHistoryTable();
            clearActiveBillWorkspace();
        }

        function initializeMenuDropdowns() {
            const catSelect = document.getElementById('itemCategory');
            catSelect.innerHTML = '';
            
            Object.keys(menuDatabase).forEach(category => {
                const opt = document.createElement('option');
                opt.value = category;
                opt.innerText = category;
                catSelect.appendChild(opt);
            });

            populateItemsMenu();
        }

        function populateItemsMenu() {
            const activeCategory = document.getElementById('itemCategory').value;
            const itemSelect = document.getElementById('itemName');
            itemSelect.innerHTML = '';

            if (menuDatabase[activeCategory]) {
                menuDatabase[activeCategory].forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.name;
                    opt.innerText = `${item.name} (₹${item.price})`;
                    itemSelect.appendChild(opt);
                });
            }
            matchDatabasePrice();
        }

        function matchDatabasePrice() {
            const cat = document.getElementById('itemCategory').value;
            const itemName = document.getElementById('itemName').value;
            const priceInput = document.getElementById('itemPrice');

            if (menuDatabase[cat]) {
                const itemMatch = menuDatabase[cat].find(i => i.name === itemName);
                if (itemMatch) {
                    priceInput.value = itemMatch.price;
                    return;
                }
            }
            priceInput.value = 0;
        }

        function togglePaymentFields(mode) {
            document.getElementById('upiFieldContainer').style.display = (mode === 'UPI') ? 'block' : 'none';
            document.getElementById('cardFieldContainer').style.display = (mode === 'Card') ? 'block' : 'none';
            liveRenderPreview();
        }

        function pushItemToInvoice() {
            const label = document.getElementById('itemName').value;
            const rate = parseFloat(document.getElementById('itemPrice').value) || 0;
            const quantity = parseInt(document.getElementById('itemQty').value) || 1;

            if (!label) {
                alert("⚠️ Choose a valid menu item configuration entry first.");
                return;
            }

            // Group duplicate matching catalog rows seamlessly 
            const duplicateIndex = currentBillItems.findIndex(i => i.name === label);
            if (duplicateIndex !== -1) {
                currentBillItems[duplicateIndex].qty += quantity;
                currentBillItems[duplicateIndex].total = currentBillItems[duplicateIndex].qty * currentBillItems[duplicateIndex].price;
            } else {
                currentBillItems.push({
                    name: label,
                    qty: quantity,
                    price: rate,
                    total: quantity * rate
                });
            }

            // Reset selection quantity back to standard single indexing properties
            document.getElementById('itemQty').value = "1";
            
            renderCartTableGrid();
            liveRenderPreview();
        }

        function dropCartItem(index) {
            currentBillItems.splice(index, 1);
            renderCartTableGrid();
            liveRenderPreview();
        }

        function renderCartTableGrid() {
            const tbody = document.getElementById('cartTableBody');
            tbody.innerHTML = '';

            if (currentBillItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-gray-400 italic">No inventory tracked inside checkout rows.</td></tr>`;
                return;
            }

            currentBillItems.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${item.name}</b></td>
                    <td class="text-center">${item.qty}</td>
                    <td class="text-right">₹${item.price.toFixed(2)}</td>
                    <td class="text-right font-bold">₹${item.total.toFixed(2)}</td>
                    <td class="text-center">
                        <button class="btn-action-del" onclick="dropCartItem(${index})">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function compileReceiptTemplateHTML(billNumber, dateStr, timeStr, customerName, customerMobile, itemsList, financials) {
            let itemRowsBuffer = '';
            itemsList.forEach(item => {
                itemRowsBuffer += `
                    <tr>
                        <td style="text-align: left; padding: 2px 0; word-break: break-word; max-width: 38mm;">${item.name}</td>
                        <td style="text-align: center; padding: 2px 0;">${item.qty}</td>
                        <td style="text-align: right; padding: 2px 0;">₹${item.total.toFixed(2)}</td>
                    </tr>
                `;
            });

            // Parse payment settlement tags for explicit dynamic rendering states
            let dynamicPaymentLabel = `Payment : ${financials.mode}`;
            if (financials.mode === 'UPI' && financials.upiId) {
                dynamicPaymentLabel += ` (${financials.upiId})`;
            } else if (financials.mode === 'Card' && financials.cardDigits) {
                dynamicPaymentLabel += ` (Ext: ${financials.cardDigits})`;
            }

            return `
                <div class="receipt-body">
                    <!-- Brand Header Section -->
                    <div class="receipt-center receipt-header-title">ETHIOPIA COFFEE HOUSE</div>
                    <div class="receipt-center receipt-header-sub">Cafe No-06, Next to SBI Bank,</div>
                    <div class="receipt-center receipt-header-sub">Below Metro Station, Chakala,</div>
                    <div class="receipt-center receipt-header-sub">J B Nagar, Andheri East,</div>
                    <div class="receipt-center receipt-header-sub">Mumbai, Maharashtra 400059</div>
                    
                    <div class="receipt-divider">--------------------------------</div>
                    
                    <!-- Identification Metadata Structural Grid Blocks -->
                    <table class="receipt-meta-table">
                        <tr><td><b>Bill No</b></td><td>: ${billNumber}</td></tr>
                        <tr><td><b>Date</b></td><td>: ${dateStr}</td></tr>
                        <tr><td><b>Time</b></td><td>: ${timeStr}</td></tr>
                        <tr><td><b>Customer</b></td><td>: ${customerName || 'Walk-in Customer'}</td></tr>
                        <tr><td><b>Mobile</b></td><td>: ${customerMobile || 'N/A'}</td></tr>
                    </table>
                    
                    <div class="receipt-divider">--------------------------------</div>
                    
                    <!-- Line Items Inventory Manifest Table -->
                    <table class="receipt-items-table">
                        <thead>
                            <tr>
                                <th style="text-align: left;">Item Name</th>
                                <th style="text-align: center; width: 12mm;">Qty</th>
                                <th style="text-align: right; width: 22mm;">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemRowsBuffer || '<tr><td colspan="3" style="text-align:center; padding:5px;">No rows added</td></tr>'}
                        </tbody>
                    </table>
                    
                    <div class="receipt-divider">--------------------------------</div>
                    
                    <!-- Financial Accounting Matrix Calculations -->
                    <table class="receipt-totals-table">
                        <tr>
                            <td style="text-align: right; width: 44mm;">Subtotal :</td>
                            <td style="text-align: right; font-weight: bold;">₹${financials.subtotal.toFixed(2)}</td>
                        </tr>
                        ${financials.discount > 0 ? `
                        <tr>
                            <td style="text-align: right; color: #000000;">Discount :</td>
                            <td style="text-align: right; font-weight: bold;">-₹${financials.discount.toFixed(2)}</td>
                        </tr>` : ''}
                        <tr class="receipt-grand-total">
                            <td style="text-align: right; border-top: 1px dashed #000000; border-bottom: 1px dashed #000000; padding: 4px 0;">TOTAL AMOUNT :</td>
                            <td style="text-align: right; border-top: 1px dashed #000000; border-bottom: 1px dashed #000000; padding: 4px 0; font-size: 14px;">₹${financials.grandTotal.toFixed(2)}</td>
                        </tr>
                    </table>
                    
                    <div class="receipt-divider">--------------------------------</div>
                    
                    <!-- System Footer Operational Identifiers Statements -->
                    <div class="receipt-center receipt-footer-text" style="font-style: italic;">No GST Applicable</div>
                    <div class="receipt-center receipt-footer-text"><b>${dynamicPaymentLabel}</b></div>
                    <div class="receipt-center receipt-footer-text" style="margin: 5px 0; font-size: 13px;">Thank You! Visit Again ☕</div>
                    <div class="receipt-center" style="font-size: 10px; opacity: 0.8; text-transform: uppercase;">ETHIOPIA COFFEE HOUSE</div>
                </div>
            `;
        }

        function liveRenderPreview() {
            let subtotal = 0;
            currentBillItems.forEach(i => subtotal += i.total);
            const discount = parseFloat(document.getElementById('billDiscount').value) || 0;
            const grandTotal = Math.max(0, subtotal - discount);

            const selectedMode = document.querySelector('input[name="paymentMode"]:checked').value;
            const upiId = document.getElementById('upiTxnId').value;
            const cardDigits = document.getElementById('cardDigits').value;

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB'); 
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            
            const currentBillFormatted = `ECH-${String(billCounterToken).padStart(6, '0')}`;
            const name = document.getElementById('custName').value;
            const mobile = document.getElementById('custMobile').value;

            const financials = {
                subtotal: subtotal,
                discount: discount,
                grandTotal: grandTotal,
                mode: selectedMode,
                upiId: upiId,
                cardDigits: cardDigits
            };

            const htmlPayload = compileReceiptTemplateHTML(currentBillFormatted, dateStr, timeStr, name, mobile, currentBillItems, financials);
            document.getElementById('virtualReceiptEmbed').innerHTML = htmlPayload;
        }

        function executeBillPrintPipeline() {
            const activeCheckoutItems = currentBillItems.filter(i => i.name.trim() !== '');
            if (activeCheckoutItems.length === 0) {
                alert("⚠️ Active cart is empty. Please register items into your inventory rows first.");
                return;
            }

            let subtotal = 0;
            activeCheckoutItems.forEach(i => subtotal += i.total);
            const discount = parseFloat(document.getElementById('billDiscount').value) || 0;
            const grandTotal = Math.max(0, subtotal - discount);

            const selectedMode = document.querySelector('input[name="paymentMode"]:checked').value;
            const upiId = document.getElementById('upiTxnId').value;
            const cardDigits = document.getElementById('cardDigits').value;

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB');
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            const currentBillFormatted = `ECH-${String(billCounterToken).padStart(6, '0')}`;
            const name = document.getElementById('custName').value || 'Walk-in Customer';
            const mobile = document.getElementById('custMobile').value || 'N/A';

            const financials = {
                subtotal: subtotal,
                discount: discount,
                grandTotal: grandTotal,
                mode: selectedMode,
                upiId: upiId,
                cardDigits: cardDigits
            };

            // Commit transaction entry payload directly to LocalStorage historical array indexes
            const billRecord = {
                billNo: currentBillFormatted,
                timestamp: `${dateStr} ${timeStr}`,
                customerName: name,
                customerMobile: mobile,
                items: activeCheckoutItems,
                financials: financials
            };

            persistentLedgerHistory.unshift(billRecord);
            if (persistentLedgerHistory.length > 100) {
                persistentLedgerHistory.pop();
            }
            localStorage.setItem('ethiopia_pos_ledger_v3', JSON.stringify(persistentLedgerHistory));

            // Up-tick sequential transactional control indicators variables
            billCounterToken++;
            localStorage.setItem('ethiopia_pos_counter_v3', billCounterToken);
            document.getElementById('screenBillId').innerText = `ECH-${String(billCounterToken).padStart(6, '0')}`;

            renderHistoryTable();

            // Direct isolated dynamic markup rendering assignment targeting physical print mirrors
            const printStation = document.getElementById('printStationContainer');
            printStation.innerHTML = compileReceiptTemplateHTML(currentBillFormatted, dateStr, timeStr, name, mobile, activeCheckoutItems, financials);

            // Execute browser execution window driver print dispatch loops
            window.print();

            // Clear operational frames to prepare workspace environment configurations
            clearActiveBillWorkspace();
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('historyTableLogsBody');
            tbody.innerHTML = '';

            if (persistentLedgerHistory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-gray-400 italic">No historical transaction logs registered locally inside the cache files.</td></tr>`;
                return;
            }

            persistentLedgerHistory.forEach(bill => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-mono font-bold" style="color: #663300;">${bill.billNo}</td>
                    <td class="text-gray-500">${bill.timestamp}</td>
                    <td><b>${bill.customerName}</b></td>
                    <td>${bill.customerMobile}</td>
                    <td class="text-right font-mono font-bold">₹${bill.financials.grandTotal.toFixed(2)}</td>
                    <td class="text-center">
                        <button class="btn-reprint" onclick="reprintPastTransaction('${bill.billNo}')">Reprint 🖨️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function reprintPastTransaction(targetBillNo) {
            const match = persistentLedgerHistory.find(b => b.billNo === targetBillNo);
            if (match) {
                const timeSegments = match.timestamp.split(' ');
                const dateStr = timeSegments[0];
                const timeStr = timeSegments.slice(1).join(' ');

                const printStation = document.getElementById('printStationContainer');
                printStation.innerHTML = compileReceiptTemplateHTML(
                    match.billNo, dateStr, timeStr, match.customerName, match.customerMobile, match.items, match.financials
                );
                window.print();
            }
        }

        function clearActiveBillWorkspace() {
            currentBillItems = [];
            document.getElementById('billDiscount').value = "0";
            document.getElementById('upiTxnId').value = "";
            document.getElementById('cardDigits').value = "";
            
            // Re-assert baseline conditional states configurations
            document.querySelector('input[name="paymentMode"][value="Cash"]').checked = true;
            togglePaymentFields('Cash');

            renderCartTableGrid();
            liveRenderPreview();
        }

        function triggerNewBillCycle() {
            if (confirm("Are you sure you want to initialize a fresh billing cycle? Unprinted changes will be wiped.")) {
                clearActiveBillWorkspace();
                document.getElementById('custName').value = '';
                document.getElementById('custMobile').value = '';
                liveRenderPreview();
            }
        }

        function toggleDarkMode() {
            const body = document.getElementById('appBody');
            const state = document.documentElement.classList.toggle('dark');
            if (state) {
                localStorage.setItem('ethiopia_dark_mode', 'true');
            } else {
                localStorage.setItem('ethiopia_dark_mode', 'false');
            }
        }
    </script>
</body>
</html>
